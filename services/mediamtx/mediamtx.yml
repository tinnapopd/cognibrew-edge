# MediaMTX Configuration
# Cognibrew Edge - Tenda CP7 Camera

# Global settings
# Available values are "error", "warn", "info", "debug".
logLevel: info
# Available values are "stdout", "file" and "syslog".
logDestinations:
  - stdout
# Timeout of read operations.
readTimeout: 10s
# Timeout of write operations.
writeTimeout: 10s

# RTSP server settings
rtsp: true
rtspAddress: :8554
protocols:
  - tcp
  - udp
# Disable unused protocols
rtmp: false
hls: false
webrtc: false
# Authentication
authMethod: internal
authInternalUsers:
  # Admin user for RTSP publish/read and API
  - user: admin
    pass: cognibrew
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:
      - action: api
      - action: metrics
      - action: pprof

# Control API
api: true
apiAddress: :9997

# Path settings
paths:
  # Tenda CP7 - Main Stream (high quality)
  tenda_cp7_main:
    source: rtsp://<username>:<password>@<camera-ip>:554/ch=1?subtype=0
    # Re-read source if disconnected
    sourceOnDemand: true

  # Tenda CP7 - Sub Stream (lower quality, less bandwidth)
  tenda_cp7_sub:
    source: rtsp://<username>:<password>@<camera-ip>:554/ch=1?subtype=1
    sourceOnDemand: true

  # Catch-all for any other paths
  all_others:
