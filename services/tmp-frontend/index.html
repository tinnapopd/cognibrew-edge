<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Cognibrew Edge – Face Recognition Management Console" />
  <title>Cognibrew Edge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* Reset & Tokens */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #1a1d27;
      --surface-2: #232633;
      --border:    #2e3245;
      --text:      #e4e6f0;
      --text-dim:  #8b8fa7;
      --accent:    #6c5ce7;
      --accent-hi: #a29bfe;
      --green:     #00cec9;
      --red:       #ff6b6b;
      --radius:    12px;
      --font:      'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* Layout */
    .wrapper {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.25rem 4rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent-hi), var(--green));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--text-dim);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.7rem 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn:hover { border-color: var(--accent); color: var(--text); }
    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }

    /* Form elements */
    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-dim);
      margin-bottom: 0.3rem;
    }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
      font-family: var(--font);
      font-size: 0.875rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1rem;
    }

    input:focus { border-color: var(--accent); }

    input[type="file"] {
      cursor: pointer;
      color: var(--text-dim);
    }

    input[type="file"]::file-selector-button {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      font-family: var(--font);
      font-size: 0.8rem;
      font-weight: 500;
      cursor: pointer;
      margin-right: 0.75rem;
      transition: opacity 0.2s;
    }

    input[type="file"]::file-selector-button:hover { opacity: 0.85; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { opacity: 0.88; }

    .btn-secondary { background: var(--green); color: var(--bg); }
    .btn-secondary:hover:not(:disabled) { opacity: 0.88; }

    /* Preview */
    .preview-area {
      margin-top: 1rem;
      text-align: center;
    }

    .preview-area img {
      max-width: 100%;
      max-height: 240px;
      border-radius: 8px;
      border: 1px solid var(--border);
      object-fit: contain;
    }

    /* Result box */
    .result {
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 320px;
      overflow-y: auto;
      display: none;
    }

    .result.show { display: block; }
    .result.success { background: #0d2b2a; border: 1px solid var(--green); color: var(--green); }
    .result.error   { background: #2b0d0d; border: 1px solid var(--red);   color: var(--red); }
    .result.info    { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); }

    /* Result wrapper with copy button */
    .result-wrapper {
      position: relative;
      margin-top: 1.25rem;
    }

    .result-wrapper .result {
      margin-top: 0;
    }

    .btn-copy {
      position: absolute;
      top: 8px;
      right: 8px;
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text-dim);
      font-family: var(--font);
      font-size: 0.72rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: none;
      z-index: 1;
    }

    .btn-copy:hover { border-color: var(--accent); color: var(--text); }
    .btn-copy.copied { border-color: var(--green); color: var(--green); }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Status badge */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      padding: 0.6rem 1rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--red);
      flex-shrink: 0;
    }

    .dot.online { background: var(--green); }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Header -->
    <header>
      <h1>☕ Cognibrew Edge</h1>
      <p>Face Recognition Console</p>
    </header>

    <!-- API Status -->
    <div class="status-bar" id="statusBar">
      <span class="dot" id="statusDot"></span>
      <span id="statusText">Checking inference server…</span>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="enroll" id="tab-enroll">Enroll Face</button>
      <button class="tab-btn" data-tab="embed" id="tab-embed">Embed (Test)</button>
    </div>

    <!-- Enroll Panel -->
    <div class="panel active" id="panel-enroll">
      <div class="card">
        <h2>Enroll a New Face</h2>
        <form id="enrollForm" enctype="multipart/form-data">
          <label for="e-username">Username</label>
          <input type="text" id="e-username" name="username" placeholder="e.g. john_doe" required />

          <label for="e-device">Device ID</label>
          <input type="text" id="e-device" name="device_id" placeholder="e.g. edge-01" required />

          <label for="e-file">Photo (face visible)</label>
          <input type="file" id="e-file" name="file" accept="image/*" required />

          <div class="preview-area" id="enrollPreview"></div>

          <button type="submit" class="btn btn-primary" id="enrollBtn">
            Enroll
          </button>
        </form>
        <div class="result" id="enrollResult"></div>
      </div>
    </div>

    <!-- Embed Panel -->
    <div class="panel" id="panel-embed">
      <div class="card">
        <h2>Extract Embeddings</h2>
        <form id="embedForm" enctype="multipart/form-data">
          <label for="m-file">Image File</label>
          <input type="file" id="m-file" name="file" accept="image/*" required />

          <div class="preview-area" id="embedPreview"></div>

          <button type="submit" class="btn btn-secondary" id="embedBtn">
            Extract
          </button>
        </form>
        <div class="result-wrapper">
          <button class="btn-copy" id="embedCopyBtn" type="button">Copy</button>
          <div class="result" id="embedResult"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    /* Config */
    const API_BASE = '/api';
    const ENROLL_URL = `${API_BASE}/enroll`;
    const EMBED_URL  = `${API_BASE}/embed`;

    /* Tabs */
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(`panel-${btn.dataset.tab}`).classList.add('active');
      });
    });

    /* Image Preview */
    function setupPreview(inputId, previewId) {
      document.getElementById(inputId).addEventListener('change', e => {
        const file = e.target.files[0];
        const area = document.getElementById(previewId);
        area.innerHTML = '';
        if (file) {
          const img = document.createElement('img');
          img.src = URL.createObjectURL(file);
          area.appendChild(img);
        }
      });
    }
    setupPreview('e-file', 'enrollPreview');
    setupPreview('m-file', 'embedPreview');

    /* Helpers */
    function showResult(el, type, text) {
      el.className = `result show ${type}`;
      el.textContent = text;
    }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      const label = btn.textContent.trim();
      if (loading) {
        btn.dataset.label = label;
        btn.innerHTML = `<span class="spinner"></span> Working…`;
      } else {
        btn.textContent = btn.dataset.label || label;
      }
    }

    /* Health Check */
    async function checkHealth() {
      const dot = document.getElementById('statusDot');
      const txt = document.getElementById('statusText');
      try {
        const r = await fetch(`${API_BASE}/docs`, { method: 'HEAD', signal: AbortSignal.timeout(3000) });
        if (r.ok) {
          dot.classList.add('online');
          txt.textContent = 'Inference server online';
        } else throw new Error();
      } catch {
        dot.classList.remove('online');
        txt.textContent = 'Inference server unreachable';
      }
    }
    checkHealth();
    setInterval(checkHealth, 15000);

    /* Enroll */
    document.getElementById('enrollForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('enrollBtn');
      const res = document.getElementById('enrollResult');
      const fd  = new FormData(e.target);

      setLoading(btn, true);
      try {
        const r = await fetch(ENROLL_URL, { method: 'POST', body: fd });
        const j = await r.json();
        if (r.ok) {
          showResult(res, 'success', JSON.stringify(j, null, 2));
        } else {
          showResult(res, 'error', `${r.status}: ${j.detail || JSON.stringify(j)}`);
        }
      } catch (err) {
        showResult(res, 'error', `Network error: ${err.message}`);
      } finally {
        setLoading(btn, false);
      }
    });

    /* Embed */
    let lastEmbedding = '';
    const embedCopyBtn = document.getElementById('embedCopyBtn');

    embedCopyBtn.addEventListener('click', async () => {
      if (!lastEmbedding) return;
      try {
        await navigator.clipboard.writeText(lastEmbedding);
        embedCopyBtn.textContent = 'Copied!';
        embedCopyBtn.classList.add('copied');
        setTimeout(() => {
          embedCopyBtn.textContent = 'Copy';
          embedCopyBtn.classList.remove('copied');
        }, 1500);
      } catch {
        embedCopyBtn.textContent = 'Failed';
        setTimeout(() => { embedCopyBtn.textContent = 'Copy'; }, 1500);
      }
    });

    document.getElementById('embedForm').addEventListener('submit', async e => {
      e.preventDefault();
      const btn = document.getElementById('embedBtn');
      const res = document.getElementById('embedResult');
      const fd  = new FormData(e.target);

      embedCopyBtn.style.display = 'none';
      lastEmbedding = '';
      setLoading(btn, true);
      try {
        const r = await fetch(EMBED_URL, { method: 'POST', body: fd });
        const j = await r.json();
        if (r.ok) {
          const embedding = j.faces?.[0]?.embedding || [];
          lastEmbedding = JSON.stringify(embedding);
          showResult(res, 'info', lastEmbedding);
          embedCopyBtn.style.display = 'block';
        } else {
          showResult(res, 'error', `${r.status}: ${j.detail || JSON.stringify(j)}`);
        }
      } catch (err) {
        showResult(res, 'error', `Network error: ${err.message}`);
      } finally {
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
