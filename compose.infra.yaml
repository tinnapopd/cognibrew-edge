# These services should not be restarted after the program runs
services:
  gateway:
    build:
      context: ./services/cognibrew-microservices/cognibrew-cloud-api-gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PROJECT_NAME=CogniBrew Cloud API Gateway
      - DEBUG=false
      - LOG_LEVEL=INFO
      - API_PREFIX_STR=/api/v1
      - CATALOG_SERVICE_URL=http://catalog:8000
      - FEEDBACK_SERVICE_URL=http://feedback-service:8080
      - NOTIFICATION_SERVICE_URL=http://notification-service:8080
      - USER_MANAGEMENT_SERVICE_URL=http://user-management-service:5001
      - JWT_SECRET_
      - JWT_ISSUER=semls-app-group
      - JWT_AUDIENCE=semls-app-audience
      - JWT_ALGORITHMS=HS256
      - HTTP_TIMEOUT=30.0
    depends_on:
      - catalog
      - recommendation
    networks:
      - cognibrew
    restart: always

  cognibrew-rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit heartbeat 120"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognibrew

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # HTTP
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6334'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognibrew

volumes:
  rabbitmq_data:
  qdrant_data:

networks:
  cognibrew:
    driver: bridge
    name: cognibrew
