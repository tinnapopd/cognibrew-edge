services:
  mediamtx:
    image: bluenviron/mediamtx:1.17.0-ffmpeg
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554" # RTSP
      - "9997:9997" # API
    volumes:
      - ./configs/mediamtx-mock.yml:/mediamtx.yml:ro
      - ./videos:/videos:ro
    networks:
      - cognibrew
