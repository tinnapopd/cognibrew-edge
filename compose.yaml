# Base stack (no GPU). For GPU support, also load the GPU override:
#   docker compose -f compose.yaml -f compose.gpu.yaml up -d

services:
  mediamtx:
    image: bluenviron/mediamtx:1.17.0
    container_name: mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554" # RTSP
      - "9997:9997" # API
    volumes:
      - ./configs/${MEDIAMTX_CONFIG:-mediamtx-tenda-mac}.yml:/mediamtx.yml:ro
    networks:
      - cognibrew

  cognibrew-rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit heartbeat 120"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognibrew

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: qdrant
    restart: unless-stopped
    ports:
      - "6333:6333" # HTTP
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6334'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognibrew

  inference-server:
    image: teetinnapop/actions:cognibrew-inference-server-latest
    platform: linux/amd64
    container_name: inference-server
    restart: unless-stopped
    command: ["python3", "stream.py"]
    environment:
      LOG_LEVEL: INFO
      STREAM_RTSP_URL: rtsp://admin:cognibrew@mediamtx:8554/${MEDIAMTX_STREAM_PATH:-tenda_cp7_main}
      STREAM_SKIP_FRAME: ${INF_STREAM_SKIP_FRAME:-5}
      STREAM_APPLY_DIFF: ${INF_STREAM_APPLY_DIFF:-true}
      STREAM_DIFF_THRESHOLD: ${INF_STREAM_DIFF_THRESHOLD:-5.0}
      RABBITMQ_HOST: cognibrew-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_EXCHANGE_NAME: cognibrew.inference
      RABBITMQ_QUEUE_NAME: cognibrew.inference.face_embedded
      RABBITMQ_FACE_EMBEDDED_ROUTING_KEY: face.embedded
      MODEL_FRAMEWORK: insightface
      MODEL_NAME: ${INF_MODEL_NAME:-buffalo_sc}
    depends_on:
      mediamtx:
        condition: service_started
      cognibrew-rabbitmq:
        condition: service_healthy
    networks:
      - cognibrew

  recognition-service:
    image: teetinnapop/actions:cognibrew-recognition-service-latest
    platform: linux/amd64
    container_name: recognition-service
    restart: unless-stopped
    labels:
      cognibrew.service: recognition
    environment:
      LOG_LEVEL: INFO
      RABBITMQ_HOST: cognibrew-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_INFERENCE_EXCHANGE_NAME: cognibrew.inference
      RABBITMQ_INFERENCE_QUEUE_NAME: cognibrew.inference.face_embedded
      RABBITMQ_FACE_EMBEDDED_ROUTING_KEY: face.embedded
      RABBITMQ_FACE_RECOGNIZED_ROUTING_KEY: face.recognized
      RABBITMQ_FACE_UPDATE_EXCHANGE_NAME: cognibrew.vectordb
      RABBITMQ_FACE_UPDATE_QUEUE_NAME: cognibrew.vectordb.face_updated
      RABBITMQ_FACE_UPDATE_ROUTING_KEY: face.updated
      RABBITMQ_SEND_COOLDOWN_SECONDS: ${REC_SEND_COOLDOWN_SECONDS:-30}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_COLLECTION_NAME: face_embeddings
      QDRANT_EMBEDDING_DIM: 512
      MODEL_SIMILARITY_THRESHOLD: ${REC_MODEL_SIMILARITY_THRESHOLD:-0.65}
    depends_on:
      cognibrew-rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - cognibrew

  version-manager:
    image: teetinnapop/actions:cognibrew-version-manager-latest
    platform: linux/amd64
    container_name: version-manager
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: INFO
      RABBITMQ_HOST: cognibrew-rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_FACE_UPDATE_EXCHANGE_NAME: cognibrew.vectordb
      RABBITMQ_FACE_UPDATE_QUEUE_NAME: cognibrew.vectordb.face_updated
      RABBITMQ_FACE_UPDATE_ROUTING_KEY: face.updated
      DOCKER_TARGET_LABEL: ${VMNG_DOCKER_TARGET_LABEL:-cognibrew.service=recognition}
      DOCKER_HEALTH_TIMEOUT_S: ${VMNG_DOCKER_HEALTH_TIMEOUT_S:-30}
      DOCKER_HEALTH_POLL_S: ${VMNG_DOCKER_HEALTH_POLL_S:-1}
      SYNC_URL: ${VMNG_SYNC_URL:-http://localhost/api/v1/sync/bundle}
      SYNC_PAGE_SIZE: ${VMNG_SYNC_PAGE_SIZE:-50}
      SYNC_SCHEDULE_TIME: ${VMNG_SYNC_SCHEDULE_TIME:-01:00}
      SYNC_CHECK_EVERY: ${VMNG_SYNC_CHECK_EVERY:-60}
      SYNC_DEVICE_ID: ${VMNG_SYNC_DEVICE_ID:-test-device}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      cognibrew-rabbitmq:
        condition: service_healthy
    networks:
      - cognibrew

  catalog:
    build:
      context: ./services/cognibrew-microservices/cognibrew-catalog-service
      dockerfile: Dockerfile
    container_name: catalog
    ports:
      - "8003:8000"
    volumes:
      - ./services/cognibrew-microservices/cognibrew-catalog-service/data:/app/data
      - ./services/cognibrew-microservices/cognibrew-catalog-service/data_test:/app/data_test
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PROJECT_NAME=CogniBrew Catalog Service
      - LOG_LEVEL=INFO
      - API_PREFIX_STR=/api/v1
      - MENU_SEED_FILE=/app/data/menu_seed.json
      - DEFAULT_RECOMMENDATION_LIMIT=5
    networks:
      - cognibrew
    restart: always

  recommendation:
    build:
      context: ./services/cognibrew-microservices/cognibrew-recommendation-service
      dockerfile: Dockerfile
    container_name: recommendation
    ports:
      - "8002:8000"
    environment:
      - LOG_LEVEL=INFO
      - DEBUG=false
      - DEVICE_ID=edge-device-01
      - RABBITMQ_HOST=cognibrew-rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=${RABBITMQ_USERNAME:-guest}
      - RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-guest}
      - RABBITMQ_INFERENCE_EXCHANGE_NAME=cognibrew.inference
      - RABBITMQ_RECOMMENDATION_QUEUE_NAME=cognibrew.inference.face_recognized
      - RABBITMQ_FACE_RECOGNIZED_ROUTING_KEY=face.recognized
      - CATALOG_SERVICE_URL=http://catalog:8000
      - CATALOG_RECOMMENDATION_LIMIT=5
      - CATALOG_HTTP_TIMEOUT=10.0
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - API_PREFIX_STR=/api/v1
    depends_on:
      cognibrew-rabbitmq:
        condition: service_healthy
      catalog:
        condition: service_started
    networks:
      - cognibrew
    restart: always

  gateway:
    build:
      context: ./services/cognibrew-microservices/cognibrew-cloud-api-gateway
      dockerfile: Dockerfile
    container_name: gateway
    ports:
      - "8001:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - PROJECT_NAME=CogniBrew Cloud API Gateway
      - DEBUG=false
      - LOG_LEVEL=INFO
      - API_PREFIX_STR=/api/v1
      - CATALOG_SERVICE_URL=http://catalog:8000
      - FEEDBACK_SERVICE_URL=http://feedback-service:8080
      - NOTIFICATION_SERVICE_URL=http://notification-service:8080
      - USER_MANAGEMENT_SERVICE_URL=http://user-management-service:5001
      - JWT_SECRET_
      - JWT_ISSUER=semls-app-group
      - JWT_AUDIENCE=semls-app-audience
      - JWT_ALGORITHMS=HS256
      - HTTP_TIMEOUT=30.0
    depends_on:
      - catalog
      - recommendation
    networks:
      - cognibrew
    restart: always

  ui:
    build:
      context: ./services/cognibrew-ui
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=${UI_API_BASE_URL:-}
        - VITE_HUB_API=${UI_HUB_API:-}
        - VITE_AUTH_API_URL=${UI_AUTH_API_URL:-}
    container_name: cognibrew-ui
    ports:
      - "3000:3000"
      - "3002:3002"
    environment:
      - EDGE_API_URL=http://gateway:8000/api/v1
    depends_on:
      - gateway
    networks:
      - cognibrew
    restart: always

volumes:
  rabbitmq_data:
  qdrant_data:

networks:
  cognibrew:
    driver: bridge
    name: cognibrew
