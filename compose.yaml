# Base stack (no GPU). For GPU support, also load the GPU override:
#   docker compose -f compose.yaml -f compose.gpu.yaml up -d

services:
  mediamtx:
    image: bluenviron/mediamtx:1.17.0
    container_name: cognibrew-mediamtx
    restart: unless-stopped
    ports:
      - "8554:8554" # RTSP
      - "9997:9997" # API
    volumes:
      - ./services/mediamtx/mediamtx-config.yml:/mediamtx.yml:ro
    networks:
      - cognibrew

  rabbitmq:
    image: rabbitmq:4.2.5-management-alpine
    container_name: cognibrew-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit heartbeat 120"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognibrew

  qdrant:
    image: qdrant/qdrant:v1.17
    container_name: cognibrew-qdrant
    restart: unless-stopped
    ports:
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/localhost/6334'"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cognibrew

  inference-server:
    image: teetinnapop/actions:cognibrew-inference-server-latest
    platform: linux/amd64
    container_name: cognibrew-inference-server
    restart: unless-stopped
    command: ["python3", "stream.py"]
    environment:
      LOG_LEVEL: ${INF_LOG_LEVEL:-INFO}
      STREAM_RTSP_URL: ${INF_STREAM_RTSP_URL:-rtsp://admin:cognibrew@mediamtx:8554/tenda_cp7_main}
      STREAM_SKIP_FRAME: ${INF_STREAM_SKIP_FRAME:-5}
      STREAM_APPLY_DIFF: ${INF_STREAM_APPLY_DIFF:-true}
      STREAM_DIFF_THRESHOLD: ${INF_STREAM_DIFF_THRESHOLD:-5.0}
      RABBITMQ_HOST: ${INF_RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${INF_RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${INF_RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${INF_RABBITMQ_PASSWORD:-guest}
      RABBITMQ_EXCHANGE_NAME: ${INF_RABBITMQ_EXCHANGE_NAME:-cognibrew.inference}
      RABBITMQ_QUEUE_NAME: ${INF_RABBITMQ_QUEUE_NAME:-cognibrew.inference.face_embedded}
      RABBITMQ_FACE_EMBEDDED_ROUTING_KEY: ${INF_RABBITMQ_FACE_EMBEDDED_ROUTING_KEY:-face.embedded}
      MODEL_FRAMEWORK: ${INF_MODEL_FRAMEWORK:-insightface}
      MODEL_NAME: ${INF_MODEL_NAME:-buffalo_sc}
    depends_on:
      mediamtx:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - cognibrew

  recognition-service:
    image: teetinnapop/actions:cognibrew-recognition-service-latest
    platform: linux/amd64
    container_name: cognibrew-recognition-service
    restart: unless-stopped
    labels:
      cognibrew.service: recognition
    environment:
      # Logging
      LOG_LEVEL: ${REC_LOG_LEVEL:-INFO}
      # RabbitMQ
      RABBITMQ_HOST: ${REC_RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${REC_RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${REC_RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${REC_RABBITMQ_PASSWORD:-guest}
      RABBITMQ_INFERENCE_EXCHANGE_NAME: ${REC_RABBITMQ_INFERENCE_EXCHANGE_NAME:-cognibrew.inference}
      RABBITMQ_INFERENCE_QUEUE_NAME: ${REC_RABBITMQ_INFERENCE_QUEUE_NAME:-cognibrew.inference.face_embedded}
      RABBITMQ_FACE_EMBEDDED_ROUTING_KEY: ${REC_RABBITMQ_FACE_EMBEDDED_ROUTING_KEY:-face.embedded}
      RABBITMQ_FACE_RECOGNIZED_ROUTING_KEY: ${REC_RABBITMQ_FACE_RECOGNIZED_ROUTING_KEY:-face.recognized}
      RABBITMQ_FACE_UPDATE_EXCHANGE_NAME: ${REC_RABBITMQ_FACE_UPDATE_EXCHANGE_NAME:-cognibrew.vectordb}
      RABBITMQ_FACE_UPDATE_QUEUE_NAME: ${REC_RABBITMQ_FACE_UPDATE_QUEUE_NAME:-cognibrew.vectordb.face_updated}
      RABBITMQ_FACE_UPDATE_ROUTING_KEY: ${REC_RABBITMQ_FACE_UPDATE_ROUTING_KEY:-face.updated}
      QDRANT_HOST: ${REC_QDRANT_HOST:-qdrant}
      QDRANT_PORT: ${REC_QDRANT_PORT:-6334}
      QDRANT_COLLECTION_NAME: ${REC_QDRANT_COLLECTION_NAME:-face_embeddings}
      QDRANT_EMBEDDING_DIM: ${REC_QDRANT_EMBEDDING_DIM:-512}
      MODEL_SIMILARITY_THRESHOLD: ${REC_MODEL_SIMILARITY_THRESHOLD:-0.65}
    depends_on:
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - cognibrew

  version-manager:
    image: teetinnapop/actions:cognibrew-version-manager-latest
    platform: linux/amd64
    container_name: cognibrew-version-manager
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: ${VMNG_LOG_LEVEL:-INFO}
      RABBITMQ_HOST: ${VMNG_RABBITMQ_HOST:-rabbitmq}
      RABBITMQ_PORT: ${VMNG_RABBITMQ_PORT:-5672}
      RABBITMQ_USERNAME: ${VMNG_RABBITMQ_USERNAME:-guest}
      RABBITMQ_PASSWORD: ${VMNG_RABBITMQ_PASSWORD:-guest}
      RABBITMQ_FACE_UPDATE_EXCHANGE_NAME: ${VMNG_RABBITMQ_FACE_UPDATE_EXCHANGE_NAME:-cognibrew.vectordb}
      RABBITMQ_FACE_UPDATE_QUEUE_NAME: ${VMNG_RABBITMQ_FACE_UPDATE_QUEUE_NAME:-cognibrew.vectordb.face_updated}
      RABBITMQ_FACE_UPDATE_ROUTING_KEY: ${VMNG_RABBITMQ_FACE_UPDATE_ROUTING_KEY:-face.updated}
      DOCKER_TARGET_LABEL: ${VMNG_DOCKER_TARGET_LABEL:-cognibrew.service=recognition}
      DOCKER_HEALTH_TIMEOUT_S: ${VMNG_DOCKER_HEALTH_TIMEOUT_S:-30}
      DOCKER_HEALTH_POLL_S: ${VMNG_DOCKER_HEALTH_POLL_S:-1}
      SYNC_URL: ${VMNG_SYNC_URL:-http://localhost/api/v1/sync/bundle}
      SYNC_PAGE_SIZE: ${VMNG_SYNC_PAGE_SIZE:-50}
      SYNC_SCHEDULE_TIME: ${VMNG_SYNC_SCHEDULE_TIME:-01:00}
      SYNC_CHECK_EVERY: ${VMNG_SYNC_CHECK_EVERY:-60}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - cognibrew

volumes:
  rabbitmq_data:
  qdrant_data:

networks:
  cognibrew:
    driver: bridge
