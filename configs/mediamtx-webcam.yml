# MediaMTX Configuration - Cognibrew Edge (Webcam)
# Only non-default values are specified here.
# Reference: https://github.com/bluenviron/mediamtx/blob/main/mediamtx.yml

# Disable unused protocols
rtmp: false
hls: false
webrtc: false
srt: false

# Enable Control API
api: true

# Authentication
authInternalUsers:
  - user: admin
    pass: cognibrew
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:
      - action: api
      - action: metrics
      - action: pprof

# Camera paths (webcam publishes directly to these via stream_webcam.sh)
paths:
  tenda_cp7_main:
  tenda_cp7_sub:
  all_others:
