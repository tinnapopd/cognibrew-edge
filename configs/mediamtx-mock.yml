logLevel: info
logDestinations: [stdout]

rtsp: yes
rtspAddress: :8554
rtspTransports: [udp, multicast, tcp]

rtmp: no
hls: no
webrtc: no

# Authentication
authInternalUsers:
  - user: admin
    pass: cognibrew
    ips: []
    permissions:
      - action: publish
        path:
      - action: read
        path:
      - action: playback
        path:
      - action: api
      - action: metrics
      - action: pprof

paths:
  tenda_cp7_main:
    runOnDemand: >-
      ffmpeg -re -stream_loop -1
      -i /videos/sample.mp4
      -c copy
      -f rtsp -rtsp_transport tcp
      rtsp://admin:cognibrew@localhost:$RTSP_PORT/$MTX_PATH
    runOnDemandRestart: yes
    runOnDemandStartTimeout: 15s
    runOnDemandCloseAfter: 5s
